<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поморсофт — интеллектуальная робототехника | Скоро открытие</title>
    <meta name="description" content="Стартап Поморсофт: промышленные коботы, цифровые двойники и образовательные платформы. Сайт в разработке — оставьте заявку на ранний доступ.">
    <!-- Open Graph для соцсетей -->
    <meta property="og:title" content="Поморсофт — умные роботы уже в пути">
    <meta property="og:description" content="Промышленная точность за бюджет студенческого проекта. Подпишитесь на запуск.">
    <meta property="og:image" content="https://pomorsoft.github.io/preview.png">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🤖</text></svg>">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0c14;
            color: #e0e0ff;
            overflow-x: hidden;
            min-height: 100vh;
        }
        /* Анимированный фон */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .overlay {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(2px);
        }
        /* Логотип */
        .logo {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(0,212,255,0.5));
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 15px rgba(0,212,255,0.4)); }
            to { filter: drop-shadow(0 0 30px rgba(168,85,247,0.7)); }
        }
        .status-badge {
            background: rgba(0,212,255,0.1);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }
        /* Типографский слоган */
        .hero-title {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 700;
            max-width: 800px;
            margin-bottom: 40px;
            line-height: 1.3;
        }
        .hero-title .gradient-text {
            background: linear-gradient(135deg, #c084fc, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #typing-text {
            border-right: 2px solid #00d4ff;
            white-space: nowrap;
            overflow: hidden;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }
        /* Таймер */
        .countdown {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }
        .time-block {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,212,255,0.3);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 20px 25px;
            min-width: 90px;
            box-shadow: 0 0 25px rgba(0,212,255,0.1);
        }
        .time-number {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .time-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8892b0;
        }
        /* Кнопка */
        .cta-button {
            display: inline-block;
            margin: 30px 0;
            padding: 16px 48px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00d4ff, #7b61ff);
            color: #0a0c14;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0,212,255,0.4);
            position: relative;
            overflow: hidden;
        }
        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 50px rgba(123,97,255,0.7);
        }
        /* Форма */
        .form-container {
            background: rgba(15, 17, 30, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            margin-top: 20px;
        }
        .form-container h2 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #00d4ff;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            background: rgba(255,255,255,0.05);
            border: 1px solid #2a3050;
            border-radius: 50px;
            padding: 15px 25px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0,212,255,0.2);
        }
        button {
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00d4ff, #7b61ff);
            color: #0a0c14;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            box-shadow: 0 0 30px #7b61ff;
        }
        .success-message {
            display: none;
            color: #34d399;
            margin-top: 15px;
        }
        footer {
            margin-top: 40px;
            color: #4a5578;
            font-size: 0.85rem;
        }
        /* Сетка на canvas рисуется в JS */
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="overlay">
        <div class="logo">ПОМОРСОФТ</div>
        <div class="status-badge">СКОРО ЗАПУСК</div>
        <h1 class="hero-title">
            <span class="gradient-text">Промышленная точность</span><br>
            <span id="typing-text"></span>
        </h1>
        <!-- Таймер -->
        <div class="countdown" id="countdown">
            <div class="time-block"><div class="time-number" id="days">00</div><div class="time-label">дней</div></div>
            <div class="time-block"><div class="time-number" id="hours">00</div><div class="time-label">часов</div></div>
            <div class="time-block"><div class="time-number" id="minutes">00</div><div class="time-label">минут</div></div>
            <div class="time-block"><div class="time-number" id="seconds">00</div><div class="time-label">секунд</div></div>
        </div>
        <a href="#form-section" class="cta-button">⚡ Хочу на запуск</a>

        <!-- Форма подписки -->
        <div class="form-container" id="form-section">
            <h2>Ранний доступ</h2>
            <form id="subscription-form">
                <div class="input-group">
                    <input type="text" placeholder="Ваше имя" id="name" required>
                    <input type="email" placeholder="Email или Telegram" id="email" required>
                    <button type="submit">Стать партнёром</button>
                </div>
                <div class="success-message" id="success-msg">✅ Спасибо! Мы свяжемся сразу после запуска.</div>
            </form>
        </div>
        <footer>
            © 2026 Поморсофт — Все права защищены
        </footer>
    </div>

    <script>
        // ===== ФОН: СЕТКА И ЧАСТИЦЫ =====
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles();
        }
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.6;
                this.speedY = (Math.random() - 0.5) * 0.6;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 212, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.floor((width * height) / 10000);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.08)';
            ctx.lineWidth = 0.5;
            const step = 60;
            for (let x = 0; x <= width; x += step) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y <= height; y += step) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }

        function animateBackground() {
            ctx.clearRect(0, 0, width, height);
            drawGrid();
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateBackground);
        }

        // ===== ЭФФЕКТ ПЕЧАТНОЙ МАШИНКИ =====
        const phrases = [
            'за бюджет студенческого проекта.',
            'доступная каждому университету.',
            'открытая архитектура для мейкеров.'
        ];
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typingElement = document.getElementById('typing-text');

        function typeEffect() {
            const current = phrases[phraseIndex];
            if (!isDeleting) {
                typingElement.textContent = current.substring(0, charIndex + 1);
                charIndex++;
                if (charIndex === current.length) {
                    isDeleting = true;
                    setTimeout(typeEffect, 1500);
                    return;
                }
            } else {
                typingElement.textContent = current.substring(0, charIndex - 1);
                charIndex--;
                if (charIndex === 0) {
                    isDeleting = false;
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                }
            }
            setTimeout(typeEffect, isDeleting ? 40 : 80);
        }

        // ===== ТАЙМЕР ОБРАТНОГО ОТСЧЁТА =====
        // Установи свою дату запуска (год, месяц(0-11), день, час, минута)
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 157); // +157 дней от сегодня

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate.getTime() - now;
            if (distance < 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (86400000)) / (3600000));
            const minutes = Math.floor((distance % 3600000) / 60000);
            const seconds = Math.floor((distance % 60000) / 1000);
            document.getElementById('days').textContent = days.toString().padStart(2, '0');
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
        }

        // ===== ФОРМА =====
        document.getElementById('subscription-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Здесь можно отправить данные через fetch или сохранить в localStorage
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            if (name && email) {
                document.getElementById('success-msg').style.display = 'block';
                this.reset();
                // Пример отправки в Google Form (раскомментируй и настрой action)
                // fetch('https://docs.google.com/forms/...', { method: 'POST', body: new FormData(this) });
            }
        });

        // ===== ЗАПУСК =====
        resizeCanvas();
        animateBackground();
        typeEffect();
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
